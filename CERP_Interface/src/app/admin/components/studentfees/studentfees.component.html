<section class="page-shell">
  <div class="hero-card">
    <span class="eyebrow">Fees</span>
    <h1 class="page-title">Manage Student Fee Records</h1>
    <p class="page-subtitle">
      Select a student first, then update that student's fee record only.
    </p>
  </div>

  <div class="section-stack">
    <section class="surface-card">
      <h2 class="section-heading">Student Fee Editor</h2>
      <p class="section-copy" *ngIf="statusMessage">{{ statusMessage }}</p>

      <div class="form-grid">
        <select [(ngModel)]="selectedStudentId" (ngModelChange)="onStudentChange($event)">
          <option [ngValue]="null">Select student</option>
          <option *ngFor="let student of students" [ngValue]="student.studentId">
            {{ student.name }} | {{ student.rollNo }}
          </option>
        </select>
        <input [(ngModel)]="draftFee.amount" type="number" placeholder="Amount">
        <input [(ngModel)]="draftFee.feesStatus" placeholder="Fee status">
        <input [(ngModel)]="draftFee.dueDate" type="date">
        <button class="btn-primary" (click)="createOrUpdateForSelectedStudent()">Save Fee Record</button>
      </div>
    </section>

    <section class="surface-card">
      <h2 class="section-heading">Fee Ledger</h2>
      <div class="table-wrap">
        <table class="erp-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Student</th>
              <th>Amount</th>
              <th>Status</th>
              <th>Due Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of fees; let i = index">
              <td>{{ row.feesId }}</td>
              <td>{{ row.studentName }}</td>
              <td><input [(ngModel)]="row.amount" [disabled]="!row.isEditing" type="number"></td>
              <td><input [(ngModel)]="row.feesStatus" [disabled]="!row.isEditing"></td>
              <td><input [(ngModel)]="row.dueDate" [disabled]="!row.isEditing" type="date"></td>
              <td>
                <button class="btn-primary" *ngIf="!row.isEditing" (click)="editRow(i)">Edit</button>
                <button class="btn-primary" *ngIf="row.isEditing" (click)="saveRow(i)">Save</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</section>
