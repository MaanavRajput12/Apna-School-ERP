<section class="page-shell">
  <div class="hero-card">
    <span class="eyebrow">Course Management</span>
    <h1 class="page-title">Manage Courses</h1>
    <p class="page-subtitle">
      Create, update, and remove courses from a dedicated admin workspace.
    </p>
  </div>

  <div class="section-stack">
    <section class="surface-card">
      <h2 class="section-heading">Add Course</h2>
      <div class="form-grid">
        <input [(ngModel)]="newCourse.courseName" placeholder="Course name">
        <input [(ngModel)]="newCourse.credits" type="number" placeholder="Credits">
      </div>
      <div class="cta-row">
        <button class="btn-primary" (click)="addCourse()">Add Course</button>
      </div>
    </section>

    <section class="surface-card">
      <h2 class="section-heading">Course List</h2>
      <p class="section-copy" *ngIf="statusMessage">{{ statusMessage }}</p>

      <div class="table-wrap">
        <table class="erp-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Course</th>
              <th>Credits</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of courses; let i = index">
              <td>{{ row.courseId }}</td>
              <td><input [(ngModel)]="row.courseName" [disabled]="!row.isEditing"></td>
              <td><input [(ngModel)]="row.credits" [disabled]="!row.isEditing" type="number"></td>
              <td>
                <button class="btn-primary" *ngIf="!row.isEditing" (click)="editRow(i)">Edit</button>
                <button class="btn-primary" *ngIf="row.isEditing" (click)="saveRow(i)">Save</button>
                <button class="btn-secondary" (click)="deleteCourse(row)">Remove</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</section>
