<section class="page-shell">
  <div class="hero-card">
    <span class="eyebrow">Subject Management</span>
    <h1 class="page-title">Manage Subjects</h1>
    <p class="page-subtitle">
      Create subject master data so exams, attendance, and schedules can use a consistent subject list.
    </p>
  </div>

  <div class="section-stack">
    <section class="surface-card">
      <h2 class="section-heading">Add Subject</h2>
      <div class="form-grid">
        <input [(ngModel)]="newSubject.name" placeholder="Subject name">
        <select [(ngModel)]="newSubject.departmentId">
          <option [ngValue]="null">Select department</option>
          <option *ngFor="let department of departments" [ngValue]="department.departmentId">
            {{ department.departmentName }}
          </option>
        </select>
        <select [(ngModel)]="newSubject.facultyId">
          <option [ngValue]="null">Select faculty</option>
          <option *ngFor="let faculty of facultyList" [ngValue]="faculty.facultyId">
            {{ faculty.facultyName }}
          </option>
        </select>
      </div>
      <div class="cta-row">
        <button class="btn-primary" (click)="addSubject()">Add Subject</button>
      </div>
    </section>

    <section class="surface-card">
      <h2 class="section-heading">Subject List</h2>
      <p class="section-copy" *ngIf="statusMessage">{{ statusMessage }}</p>

      <div class="table-wrap">
        <table class="erp-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Department</th>
              <th>Faculty</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let row of activeSubjects">
              <td>{{ row.subjectId }}</td>
              <td><input [(ngModel)]="row.name" [disabled]="!row.isEditing"></td>
              <td>
                <select [(ngModel)]="row.departmentId" [disabled]="!row.isEditing">
                  <option [ngValue]="null">Select department</option>
                  <option *ngFor="let department of departments" [ngValue]="department.departmentId">
                    {{ department.departmentName }}
                  </option>
                </select>
              </td>
              <td>
                <select [(ngModel)]="row.facultyId" [disabled]="!row.isEditing">
                  <option [ngValue]="null">Select faculty</option>
                  <option *ngFor="let faculty of facultyList" [ngValue]="faculty.facultyId">
                    {{ faculty.facultyName }}
                  </option>
                </select>
              </td>
              <td>
                <button class="btn-primary" *ngIf="!row.isEditing" (click)="editRow(row.subjectId)">Edit</button>
                <button class="btn-primary" *ngIf="row.isEditing" (click)="saveRow(row.subjectId)">Save</button>
                <button class="btn-secondary" (click)="deleteSubject(row)">Remove</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>
</section>
